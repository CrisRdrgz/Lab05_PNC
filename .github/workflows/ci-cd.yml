name: CI/CD Docker

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-test-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Run tests
        run: mvn clean test

      - name: Package application
        run: mvn clean package

      - name: Build Docker image
        run: docker build -t luffy-api .

      - name: Create env file
        run: |
          echo "POSTGRES_USER=postgres" >> .env
          echo "POSTGRES_PASSWORD=1234" >> .env
          echo "POSTGRES_DB=OnePiece" >> .env
          echo "SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/OnePiece" >> .env
          echo "SPRING_DATASOURCE_USERNAME=postgres" >> .env
          echo "SPRING_DATASOURCE_PASSWORD=1234" >> .env

      - name: Smoke test with Docker Compose
        run: |
          docker compose up -d
          sleep 30
          curl --fail http://localhost:8080/api/pirates
          docker compose down

      - name: Login to Docker Hub
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push Docker image
        if: github.ref == 'refs/heads/main'
        run: |
          docker tag luffy-api crisrdrgz/luffy-api:latest
          docker push crisrdrgz/luffy-api:latest